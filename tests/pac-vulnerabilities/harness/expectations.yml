# Expected outcomes for the PAC vulnerability suite (ADR-2026-05-30-005).
#
# For each test, declare what the harness should see on each variant:
#   stdout_contains  -- substring that MUST appear in stdout for PASS
#   stdout_excludes  -- substring that MUST NOT appear in stdout for PASS
#   exit             -- list of acceptable process exit codes for PASS
#
# Exit codes 132/134/135/139 = 128 + signal: SIGILL, SIGABRT, SIGBUS, SIGSEGV.
# The pac variant of t01-t04 accepts any of these to mirror verify-trap in
# baseline/aarch64-hello-pac/Makefile.
#
# UNEXPECTED:* in stdout is always an ERROR regardless of these rules; the
# harness flags it before applying the contains/excludes checks.

t01_stack_bof_ret:
  nopac: { stdout_contains: "PWNED:t01", exit: [0] }
  pac:   { stdout_excludes: "PWNED:t01", exit: [132, 134, 135, 139] }

t02_ret2func:
  nopac: { stdout_contains: "PWNED:t02", exit: [0] }
  pac:   { stdout_excludes: "PWNED:t02", exit: [132, 134, 135, 139] }

t03_rop_2gadget:
  nopac: { stdout_contains: "PWNED:t03", exit: [0] }
  pac:   { stdout_excludes: "PWNED:t03", exit: [132, 134, 135, 139] }

t04_off_by_one_lr:
  nopac: { stdout_contains: "PWNED:t04", exit: [0] }
  pac:   { stdout_excludes: "PWNED:t04", exit: [132, 134, 135, 139] }

# Negative controls: PAC-ret does NOT block these. Both variants are
# expected to succeed (win string present, exit 0). Their purpose is to
# document the boundary of pac-ret's protection, not to detect anything.

t05a_fptr_overwrite:
  nopac: { stdout_contains: "PWNED:t05a", exit: [0] }
  pac:   { stdout_contains: "PWNED:t05a", exit: [0] }

t05b_data_only:
  nopac: { stdout_contains: "PWNED:t05b", exit: [0] }
  pac:   { stdout_contains: "PWNED:t05b", exit: [0] }

# t06 documents a PAC-ret bypass (Liljestrand et al., USENIX Sec '19,
# Sections 3 and 7.2.1): pac-ret signs LR with SP as the modifier, so
# an authenticated LR captured from one function is reusable in any
# other function that runs at the same SP. PARTS (Section 5.3,
# Listing 2) fixes this with a function-id modifier; vanilla
# -mbranch-protection=pac-ret does not. Both variants are expected
# to succeed because PAC does NOT block this primitive.
t06_sp_collision_pac_reuse:
  nopac: { stdout_contains: "PWNED:t06", exit: [0] }
  pac:   { stdout_contains: "PWNED:t06", exit: [0] }

# t07 demonstrates that PAC hardware CAN protect arbitrary 64-bit data
# when the program explicitly signs/authenticates it via inline asm
# pacia/autia (instruction A-key). This is the complement to t05b
# (which shows that compiler-default pac-ret does NOT cover data).
# Reference: Choi et al., "High-Performance and Secure Data Integrity
# Verification using ARM Pointer Authentication", ICTC 2025 (I-ACIV).
t07_explicit_data_signing:
  nopac: { stdout_contains: "PWNED:t07", exit: [0] }
  pac:   { stdout_excludes: "PWNED:t07", exit: [132, 134, 135, 139] }

# t08 demonstrates the PAC Oracle primitive: a crash/no-crash
# distinguisher used to brute-force a PAC value. Reference:
# Ravichandran et al., "PACMAN: Attacking ARM Pointer Authentication
# With Speculative Execution", IEEE Computer Architecture Top Picks
# 2022 (MIT). Our test uses a software signal-handler oracle (noisy);
# PACMAN's contribution is making the same oracle stealthy via
# speculative execution on Apple M1. Both variants are expected to
# PWN -- this test demonstrates a bypass via finite PAC entropy,
# not a case where PAC blocks anything. Scope: bruteforce only the
# low 8 bits of the PAC (BRUTE_BITS=8) for runtime budget; full
# 2^b is feasible offline (~17s for 24 bits per the PACMAN paper).
t08_pac_oracle_bruteforce:
  nopac: { stdout_contains: "PWNED:t08", exit: [0] }
  pac:   { stdout_contains: "PWNED:t08", exit: [0] }
